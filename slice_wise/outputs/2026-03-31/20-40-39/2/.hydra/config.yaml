dataset:
  name: naive40
  naive40:
    mat_file: Naive40_export.mat
  brats:
    data_dir: MICCAI_BraTS_2019_Data_Training
    name_mapping: MICCAI_BraTS_2019_Data_Training/name_mapping.csv
    max_patients: 50
data:
  random_state: 42
  n_folds: 5
features:
  tumor_only: true
  naive40:
    feature_cols:
    - ADC
    - ADC_K
    - Darkfluid
    - T1_mprage
    - T1_mprageKM
    - T2
  brats:
    feature_cols:
    - flair
    - t1
    - t1ce
    - t2
  planes:
  - axial
  - coronal
  - sagittal
  min_tumor_pixels: 50
  target_size: 224
model:
  type: modular_cnn
  modular_cnn:
    adapter_out_channels: 3
    backbone: resnet50
    pretrained: true
    freeze_backbone: true
    extract_layer: avgpool
  classifier:
    types:
    - mlp
    - logistic_regression
    - decision_tree
    - knn
    - random_forest
    - gmm
    - majority
    - svm
    - tabpfn
    type: mlp
    mlp:
      hidden_layer_sizes:
      - 128
      - 64
      alpha: 0.0001
    logistic_regression:
      weight_decay: 5.0
    decision_tree:
      depth: 5
    knn:
      k: 5
    svm:
      C: 1.0
      kernel: linear
      gamma: auto
    random_forest:
      n_estimators: 100
      depth: 10
      max_features: sqrt
      bootstrap: true
    gmm:
      n_components_per_class: 3
      covariance_type: diag
      max_iter: 100
      tol: 0.001
      reg_covar: 1.0e-06
    majority: {}
    tabpfn:
      batch_size: 5000
      ignore_pretraining_limits: true
patient_aggregation: majority
mil:
  epochs: 50
  lr: 0.01
train:
  seed: 420
  device: cuda
  inference_batch_size: 32
