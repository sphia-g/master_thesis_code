# Hydra configuration for slice-wise classification
hydra:
  run:
    dir: ${hydra.runtime.cwd}/slice_wise/outputs/${now:%Y-%m-%d}/${now:%H-%M-%S}
  sweep:
    dir: ${hydra.runtime.cwd}/slice_wise/outputs/multirun/${now:%Y-%m-%d}/${now:%H-%M-%S}
    subdir: ${hydra.job.num}

# Dataset selection
dataset:
  name: naive40  # Options: 'naive40', 'brats'
  
  naive40:
    mat_file: Naive40_export.mat

  brats:
    data_dir: MICCAI_BraTS_2019_Data_Training
    name_mapping: MICCAI_BraTS_2019_Data_Training/name_mapping.csv
    max_patients: 50

data:
  random_state: 42
  n_folds: 5

features:
  tumor_only: true
  # Dataset-specific feature configs
  naive40: 
    # modalities to extract per slice
    feature_cols: 
      - ADC
      - ADC_K
      - Darkfluid
      #- PET_late
      - T1_mprage
      - T1_mprageKM
      - T2
      #- PET_dynamic
      #- PETwashinslope
      #- PETwashin_intercept
      #- PETwashoutslope
      #- PETwashout_intercept
      #- PETIntegral
      #- PET_TTP

  brats:
    feature_cols:
      - flair # = Darkfluid
      - t1 # = T1mprage
      - t1ce # = T1mprageKM
      - t2 # = T2

  # slice extraction settings
  planes:
    - axial
    - coronal
    - sagittal
  
  # minimum number of tumor pixels required per slice (0 = all slices with any tumor)
  min_tumor_pixels: 50
 
  # CNN input size
  target_size: 224 # 448 for medsiglip_448, 224 for all others

model:
  type: modular_cnn

  modular_cnn:
    adapter_out_channels: 3 # 4 for medim_stunet_b, 3 for all others
    backbone: path_foundation # Options: 'resnet18', 'resnet34', 'resnet50', 'radimagenet_resnet50', 'efficientnet_b0', 'efficientnet_b1', 'medim_stunet_b', 'medsiglip_448', 'path_foundation'
    pretrained: true
    freeze_backbone: true
    extract_layer: output # resnet und efficientnet: avgpool, path_foundation: output, medsiglip_448: cls_token, rasimagenet_resnet50: layer4, medim_stunet_b: encoder

  classifier:
    types: [mlp]  # List of classifiers to evaluate
    type: mlp  # Default single classifier (for backward compatibility)

    mlp:
      hidden_layer_sizes: [64, 16]
      alpha: 0.0001

    logistic_regression:
      weight_decay: 5.0

    decision_tree:
      depth: 5

    knn:
      k: 5

    svm:
      C: 1.0
      kernel: linear
      gamma: auto

    random_forest:
      n_estimators: 100
      depth: 10
      max_features: sqrt
      bootstrap: true

    gmm:
      n_components_per_class: 3
      covariance_type: diag
      max_iter: 100
      tol: 0.001
      reg_covar: 0.000001

    majority: {}

    tabpfn:
      batch_size: 5000
      ignore_pretraining_limits: true

# Optional phase-2 fine-tuning from prior fold checkpoints.
# Set checkpoint_path to the .pth of any fold from a Phase 1 run (the loader
# resolves the other folds automatically). Leave commented out for Phase 1.
#phase2:
#  checkpoint_path: outputs/2026-02-19/14-30-00/mlp/checkpoint_fold_1.pth
#  unfreeze_n_layers: 2       # 0=adapter+head only, 1=layer4, 2=layer3+4, -1=all
#  learning_rate: 0.00001
#  num_epochs: 10
#  batch_size: 16

# Patient-level aggregation
patient_aggregation: attention  # majority, attention
mil:
  epochs: 50
  lr: 0.01

# Runtime
train:
  seed: 420
  device: cuda
  inference_batch_size: 32