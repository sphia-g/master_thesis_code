hydra:
  run:
    dir: ${hydra.runtime.cwd}/Classification/voxel_wise/outputs/${now:%Y-%m-%d}/${now:%H-%M-%S}
  sweep:
    dir: ${hydra.runtime.cwd}/Classification/voxel_wise/outputs/multirun/${now:%Y-%m-%d}/${now:%H-%M-%S}
    subdir: ${hydra.job.num}
  launcher:
    _target_: hydra._internal.core_plugins.basic_launcher.BasicLauncher
  sweeper:
    _target_: hydra._internal.core_plugins.basic_sweeper.BasicSweeper
    max_batch_size: null
    params: null
  help:
    app_name: ${hydra.job.name}
    header: '${hydra.help.app_name} is powered by Hydra.

      '
    footer: 'Powered by Hydra (https://hydra.cc)

      Use --hydra-help to view Hydra specific help

      '
    template: '${hydra.help.header}

      == Configuration groups ==

      Compose your configuration from those groups (group=option)


      $APP_CONFIG_GROUPS


      == Config ==

      Override anything in the config (foo.bar=value)


      $CONFIG


      ${hydra.help.footer}

      '
  hydra_help:
    template: 'Hydra (${hydra.runtime.version})

      See https://hydra.cc for more info.


      == Flags ==

      $FLAGS_HELP


      == Configuration groups ==

      Compose your configuration from those groups (For example, append hydra/job_logging=disabled
      to command line)


      $HYDRA_CONFIG_GROUPS


      Use ''--cfg hydra'' to Show the Hydra config.

      '
    hydra_help: ???
  hydra_logging:
    version: 1
    formatters:
      simple:
        format: '[%(asctime)s][HYDRA] %(message)s'
    handlers:
      console:
        class: logging.StreamHandler
        formatter: simple
        stream: ext://sys.stdout
    root:
      level: INFO
      handlers:
      - console
    loggers:
      logging_example:
        level: DEBUG
    disable_existing_loggers: false
  job_logging:
    version: 1
    formatters:
      simple:
        format: '[%(asctime)s][%(name)s][%(levelname)s] - %(message)s'
    handlers:
      console:
        class: logging.StreamHandler
        formatter: simple
        stream: ext://sys.stdout
      file:
        class: logging.FileHandler
        formatter: simple
        filename: ${hydra.runtime.output_dir}/${hydra.job.name}.log
    root:
      level: INFO
      handlers:
      - console
      - file
    disable_existing_loggers: false
  env: {}
  mode: MULTIRUN
  searchpath: []
  callbacks: {}
  output_subdir: .hydra
  overrides:
    hydra:
    - hydra.mode=MULTIRUN
    task:
    - model.type=mlp,logistic_regression,decision_tree,knn,random_forest,gmm,majority,svm,tabpfn
  job:
    name: main
    chdir: null
    override_dirname: model.type=mlp,logistic_regression,decision_tree,knn,random_forest,gmm,majority,svm,tabpfn
    id: ???
    num: ???
    config_name: frozen_config
    env_set: {}
    env_copy: []
    config:
      override_dirname:
        kv_sep: '='
        item_sep: ','
        exclude_keys: []
  runtime:
    version: 1.3.2
    version_base: '1.3'
    cwd: /mnt/lustre/home/nahnsen/nahga139/master_thesis/Code
    config_sources:
    - path: hydra.conf
      schema: pkg
      provider: hydra
    - path: /tmp/nahga139-2972512/voxel_cfg_yPEluE
      schema: file
      provider: main
    - path: ''
      schema: structured
      provider: schema
    output_dir: ???
    choices:
      hydra/env: default
      hydra/callbacks: null
      hydra/job_logging: default
      hydra/hydra_logging: default
      hydra/hydra_help: default
      hydra/help: default
      hydra/sweeper: basic
      hydra/launcher: basic
      hydra/output: default
  verbose: false
dataset:
  name: brats
  naive40:
    mat_file: Naive40_export.mat
  brats:
    data_dir: MICCAI_BraTS_2019_Data_Training
    name_mapping: MICCAI_BraTS_2019_Data_Training/name_mapping.csv
data:
  random_state: 42
  n_folds: 5
features:
  tumor_only: true
  naive40:
    feature_cols:
    - ADC
    - ADC_K
    - Darkfluid
    - PET_late
    - T1_mprage
    - T1_mprageKM
    - T2
    - PET_dynamic
    - PETwashinslope
    - PETwashin_intercept
    - PETwashoutslope
    - PETwashout_intercept
    - PETIntegral
    - PET_TTP
  brats:
    feature_cols:
    - flair
    - t1
    - t1ce
    - t2
  sample_ratio: 0.1
hybrid_clustering:
  enabled: false
  method: kmeans
  n_clusters: 3
  find_optimal_k: false
  k_range:
  - 2
  - 8
  criterion: percentage_diff
  min_cluster_voxels: 10
model:
  type: tabpfn
  mlp:
    hidden_layer_sizes:
    - 64
    - 32
    alpha: 0.01
  logistic_regression:
    weight_decay: 5.0
  decision_tree:
    depth: 3
  knn:
    k: 5
  svm:
    C: 1.0
    kernel: linear
    gamma: auto
  random_forest:
    n_estimators: 100
    depth: 10
    max_features: sqrt
    bootstrap: true
  gmm:
    n_components_per_class: 3
    covariance_type: diag
    max_iter: 100
    tol: 0.001
    reg_covar: 1.0e-06
  majority: {}
  tabpfn:
    batch_size: 5000
    ignore_pretraining_limits: true
patient_aggregation: majority
mil:
  epochs: 50
  lr: 0.01
train:
  seed: 420
  device: cuda
