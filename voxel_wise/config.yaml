# Hydra configuration for experiment management
hydra:
  run:
    dir: ${hydra.runtime.cwd}/voxel_wise/outputs/${now:%Y-%m-%d}/${now:%H-%M-%S}
  sweep:
    dir: ${hydra.runtime.cwd}/voxel_wise/outputs/multirun/${now:%Y-%m-%d}/${now:%H-%M-%S}
    subdir: ${hydra.job.num}

# Dataset selection
dataset:
  name: naive40  # Options: 'naive40', 'brats'
  
  naive40:
    mat_file: Naive40_export.mat
  
  # BraTS specific
  brats:
    data_dir: MICCAI_BraTS_2019_Data_Training
    name_mapping: MICCAI_BraTS_2019_Data_Training/name_mapping.csv

data:
  random_state: 42
  n_folds: 5

features:
  tumor_only: true
  # Dataset-specific feature configs
  naive40: 
    # modalities to extract per voxel
    feature_cols:
      #- ADC
      #- ADC_K
      #- Darkfluid
      - PET_late
      #- T1_mprage
      #- T1_mprageKM
      #- T2
      - PET_dynamic
      - PETwashinslope
      - PETwashin_intercept
      - PETwashoutslope
      - PETwashout_intercept
      - PETIntegral
      - PET_TTP

  brats:
    feature_cols:
      - flair
      - t1
      - t1ce
      - t2

  # sampling: fraction of tumor voxels per patient (recommended) and optional cap
  sample_ratio: 0.1
  # max_voxels_per_patient: 2000  # set null / remove to disable cap

hybrid_clustering:
  enabled: false  # Set to true to enable hybrid approach
  method: kmeans  # or 'gmm'
  n_clusters: 3   # Fixed k (from exploration)
  find_optimal_k: false  # If true, find k per fold (slower)
  k_range: [2, 8]  # Range to search if find_optimal_k=true
  criterion: percentage_diff  # Criterion for selecting discriminative cluster
  min_cluster_voxels: 10  # Minimum voxels needed to make cluster-based prediction

model:
  type: mlp  # tabpfn, mlp, logistic_regression, decision_tree, knn, svm, random_forest, gmm, majority

  mlp:
    hidden_layer_sizes: [32, 8]
    alpha: 0.01  # L2 regularization

  logistic_regression:
    weight_decay: 5.0 

  decision_tree:
    depth: 3

  knn:
    k: 5

  svm:
    C: 1.0
    kernel: linear
    gamma: auto

  random_forest:
    n_estimators: 100
    depth: 10
    max_features: sqrt
    bootstrap: true

  gmm:
    n_components_per_class: 3  # Number of Gaussian components per class
    covariance_type: diag  # Options: 'full', 'diag', 'spherical'
    max_iter: 100  # Maximum EM iterations
    tol: 0.001  # Convergence tolerance
    reg_covar: 0.000001  # Covariance regularization

  majority: {}  # No hyperparameters needed

  tabpfn:
    batch_size: 5000
    ignore_pretraining_limits: true

patient_aggregation: "majority"   # Options: "majority", "attention"
mil:
  epochs: 50
  lr: 0.01

train:
  seed: 420
  device: cuda
